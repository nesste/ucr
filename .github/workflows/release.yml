name: release-assets

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing numeric release tag to rebuild and upload assets for
        required: true
        type: string

permissions:
  contents: write

jobs:
  artifacts:
    runs-on: ubuntu-latest
    env:
      UCR_OFFICIAL_REGISTRY_URL: ${{ vars.UCR_OFFICIAL_REGISTRY_URL || 'https://ucr.network/registry/ucr-official/latest/registry.json' }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.release_tag }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4
      - run: bun ci
      - run: bun run release:artifacts
      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          mapfile -t files < <(find dist/release -type f)
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
