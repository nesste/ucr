name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.4
      - run: bun ci
      - run: bun run build
      - run: bun run docs:build
      - run: bun run typecheck
      - run: bun test
